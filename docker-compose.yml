services:
  pitch-server:
    build: .
    container_name: pitch-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:1337:1337"
    mem_limit: 512m
    volumes:
      - ./gamelogs:/app/gamelogs
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=256
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://www.playpitch.net,https://playpitch.net}
