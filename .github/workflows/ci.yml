name: CI
on:
  push:
  pull_request:
  workflow_call:
jobs:
  webserver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd webserver && npm ci && npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd pitch-online && rm -rf node_modules package-lock.json && npm install && npm run build && npm run lint
